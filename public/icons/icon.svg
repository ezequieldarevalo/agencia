<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#030712"/>
  <rect x="40" y="40" width="432" height="432" rx="72" fill="#111827"/>
  <!-- Car silhouette -->
  <g transform="translate(256, 220)" fill="none" stroke="#3b82f6" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Car body -->
    <path d="M-120,30 L-100,-20 L-60,-60 L60,-60 L100,-20 L120,30" fill="#1e3a5f"/>
    <path d="M-130,30 L130,30" />
    <path d="M-100,-20 L-60,-60 L60,-60 L100,-20"/>
    <!-- Roof -->
    <path d="M-55,-60 L-40,-95 L40,-95 L55,-60" fill="#172554" stroke="#3b82f6"/>
    <!-- Wheels -->
    <circle cx="-75" cy="35" r="22" fill="#1f2937" stroke="#60a5fa" stroke-width="8"/>
    <circle cx="75" cy="35" r="22" fill="#1f2937" stroke="#60a5fa" stroke-width="8"/>
    <!-- Headlights -->
    <rect x="105" y="-10" width="18" height="12" rx="3" fill="#fbbf24"/>
    <rect x="-123" y="-10" width="18" height="12" rx="3" fill="#fbbf24"/>
  </g>
  <!-- Text -->
  <text x="256" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="52" fill="white" letter-spacing="2">AUTOSOFT</text>
  <text x="256" y="405" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="22" fill="#9ca3af">Gestión de Agencia</text>
</svg>
